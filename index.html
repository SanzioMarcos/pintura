<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Captura</title>
    <style>
        /* --- ESTILIZAÇÃO CSS --- */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #d1d5db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
            color: var(--text-color);
        }

        p.subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            display: block;
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            display: block;
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Fale Conosco</h2>
        <p class="subtitle">Insira seus dados abaixo para entrar em contato.</p>

        <form id="meuFormulario">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="Nome" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="Email" placeholder="seu.email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="Mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>

            <button type="submit" id="btnEnviar">Enviar Mensagem</button>
        </form>

        <div id="feedback" class="message"></div>
    </div>

    <script>
        // Lembre-se de colar a URL gerada no Google Apps Script aqui dentro das aspas:
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzV7D8D93xdhj---Lzm6b7JwM05iBNt6WewBNvSfwdBsVMy4kP4jpZDFECTYW1m4tuR/exec';
        
        const form = document.getElementById('meuFormulario');
        const btnEnviar = document.getElementById('btnEnviar');
        const feedback = document.getElementById('feedback');

        form.addEventListener('submit', e => {
            e.preventDefault(); // Impede o recarregamento da página
            
            // Desativa o botão e muda o texto para indicar progresso
            btnEnviar.disabled = true;
            btnEnviar.innerText = 'Enviando...';
            
            // Esconde mensagens de feedback anteriores
            feedback.className = 'message';
            feedback.style.display = 'none';

            // Envia a requisição POST para o Apps Script
            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    feedback.innerText = 'Dados enviados com sucesso! Verifique sua planilha.';
                    feedback.classList.add('success');
                    form.reset(); // Limpa os campos do formulário
                })
                .catch(error => {
                    console.error('Erro ao enviar:', error.message);
                    feedback.innerText = 'Houve um erro ao enviar os dados. Tente novamente.';
                    feedback.classList.add('error');
                })
                .finally(() => {
                    // Reativa o botão após o término da requisição (sucesso ou erro)
                    btnEnviar.disabled = false;
                    btnEnviar.innerText = 'Enviar Mensagem';
                });
        });
    </script>

</body>
</html>
